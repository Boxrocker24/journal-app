label:
  delta: 0.0005
  drop_neutral: true
decision:
  th_long: 0.6
  th_short: 0.6
model:
  baseline: logistic
  gradient_boosting: true
validation:
  train_frac: 0.6
  val_frac: 0.2
  test_frac: 0.2
monitor:
  min_precision_20: 0.5
  max_feature_zshift: 2.5
paths:
  raw_dir: data/raw
  processed_dir: data/processed
  outputs_dir: data/outputs
